<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Knox Obfuscator — Settings</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 560px;
        margin: 24px auto;
        padding: 0 20px;
        color: #1a202c;
      }
      h1 { font-size: 20px; }
      .mode {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-radius: 10px;
        background: #f7fafc;
        border: 1px solid #e2e8f0;
        margin-bottom: 20px;
      }
      .mode b { font-size: 15px; }
      .pill { font-size: 12px; padding: 2px 8px; border-radius: 999px; color: #fff; }
      .pill.on { background: #2f855a; }
      .pill.off { background: #c53030; }
      ul { list-style: none; padding: 0; }
      li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 4px;
        border-bottom: 1px solid #edf2f7;
      }
      .hint { color: #718096; font-size: 13px; line-height: 1.5; }
      code { background: #edf2f7; padding: 1px 5px; border-radius: 4px; }
      switch-label { font-size: 14px; }
      input[type="checkbox"] { width: 18px; height: 18px; }
      .saved { color: #2f855a; font-size: 13px; height: 16px; }
    </style>
  </head>
  <body>
    <h1>Knox Portal Obfuscator</h1>

    <div class="mode">
      <button id="toggle"></button>
      <div>
        <b>Mode: <span id="modeName"></span></b>
        <div class="hint" id="modeHint"></div>
      </div>
    </div>

    <p class="hint">
      Click the toolbar icon any time to flip between <b>Private</b> (masked) and
      <b>Show</b> (real values). To copy a real value in <em>either</em> mode, hover it and
      click the <b>COPY</b> pill — clicking the value itself follows its link.
    </p>

    <h3>What to mask</h3>
    <ul id="rules"></ul>

    <div class="saved" id="saved"></div>

    <script src="config.js"></script>
    <script src="options.js"></script>
  </body>
</html>
